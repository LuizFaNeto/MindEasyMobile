name: Testes MindEasy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================================
  # Job 1: Testes unitários (Jest)
  # ============================================================
  unit-tests:
    name: Testes Unitários (Jest)
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Instalar Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Rodar testes unitários
        run: npm run test:unit

  # ============================================================
  # Job 2: Validação de sintaxe Robot Framework (dry-run)
  # Não requer Appium nem emulador — apenas verifica a estrutura
  # dos arquivos .robot
  # ============================================================
  robot-syntax:
    name: Validação Robot Framework (dry-run)
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências Robot Framework
        run: pip install -r requirements.txt

      - name: Validar sintaxe dos testes Robot (dry-run)
        run: robot --dryrun tests/mobile/
